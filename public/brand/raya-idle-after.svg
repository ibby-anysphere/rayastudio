      <stop offset=".48" stop-color="#fff0aa"/>
      <stop offset="1" stop-color="#9a7332"/>
    </linearGradient>
    <radialGradient id="diamond">
      <stop stop-color="#fff"/>
      <stop offset=".35" stop-color="#e7f7ff"/>
      <stop offset="1" stop-color="#a9c9d5"/>
    </radialGradient>
    <filter id="portraitBlur">
