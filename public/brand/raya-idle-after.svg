      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#fff8c9" flood-opacity=".8"/>
    </filter>
    <clipPath id="neckOnly">
      <rect x="116" y="252" width="144" height="86"/>
    </clipPath>
  </defs>

  <rect width="360" height="460" rx="32" fill="#e9ded8"/>
